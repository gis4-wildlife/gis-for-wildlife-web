<!DOCTYPE html>
<html lang="en" style="--photo-font: 'Cormorant Garamond';">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../uploads/Logo/ocean-web-removebg-alt.png" />
  <title>Contact — GIS for Wildlife</title>
  <meta name="description" content="Get in touch with GIS for Wildlife. Booking systems, marine wildlife monitoring, and biologging services." />
  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gis4-wildlife.com/contact/" />
  <meta property="og:title" content="Contact — GIS for Wildlife" />
  <meta property="og:description" content="Get in touch with GIS for Wildlife. Booking systems, marine wildlife monitoring, and biologging services." />
  <meta property="og:image" content="https://gis4-wildlife.com/uploads/Contact_page/GAB4404_ed.jpg" />
  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact — GIS for Wildlife" />
  <meta name="twitter:description" content="Get in touch with GIS for Wildlife. Booking systems, marine wildlife monitoring, and biologging services." />
  <meta name="twitter:image" content="https://gis4-wildlife.com/uploads/Contact_page/GAB4404_ed.jpg" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    ul.nav-links li { list-style: none !important; padding: 0 !important; margin: 0 !important; }
    ul.nav-links { list-style: none !important; padding: 0 !important; margin: 0 !important; display: flex !important; gap: 36px !important; }
    @media (max-width: 768px) {
      ul.nav-links { gap: 0px !important; }
    }
    ul.nav-links li { display: flex !important; align-items: center !important; }
    .nav-links a { font-family: 'Ovo', Georgia, serif !important; font-size: 19px !important; color: rgba(255,255,255,0.92) !important; display: inline-block !important; position: relative !important; }
    nav.scrolled .nav-links a { color: var(--navy-mid) !important; }
    .nav-links a.active::after { width: 100% !important; background: var(--ocean-lt) !important; }
    .nav-links a:hover::after { width: 100% !important; background: var(--ocean-lt) !important; }
    .nav-links a.active { color: var(--ocean-lt) !important; }
    .contact-hero-img { object-position: center 40%; filter: brightness(0.9) saturate(1.05) !important; }
    #hero .hero-overlay { background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, rgba(0,0,0,0.20) 10%, rgba(0,0,0,0) 15%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.85) 100%); }

    /* Contact form */
    .contact-form-section {
      background: var(--white);
      padding: 80px 48px;
    }
    .contact-form-wrap {
      max-width: 640px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy-mid);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid rgba(13,27,42,0.15);
      border-radius: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--navy);
      background: #fff;
      transition: border-color 0.2s;
      box-sizing: border-box;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--ocean);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 140px;
    }
    .form-submit { margin-top: 8px; }
    .form-success {
      display: none;
      background: var(--off-white);
      border-radius: 10px;
      padding: 20px 24px;
      color: var(--navy);
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      margin-top: 20px;
      text-align: center;
    }
    @media (max-width: 768px) {
      .contact-form-section { padding: 56px 24px; }
      .contact-hero-img { object-position: 20% 40% !important; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     NAVIGATION
═══════════════════════════════════════ -->
<nav id="main-nav">
  <a href="../" class="nav-logo-wrap">
    <img src="../uploads/Logo/gis_for_wildlife_new_logo_web-removebg-preview.png" alt="GIS for Wildlife" class="nav-logo" />
  </a>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links nav-links-center">
    <li><a href="../">Home</a></li>
    <li><a href="../biologging/">Biologging</a></li>
    <li><a href="../data/">Data</a></li>
    <li><a href="./" class="active">Contact</a></li>
  </ul>
  <div class="nav-spacer"></div>
</nav>


<!-- ═══════════════════════════════════════
     HERO
═══════════════════════════════════════ -->
<section class="hero" id="hero">
  <img
    src="../uploads/Contact_page/GAB4730_ed.jpg"
    alt="Contact GIS for Wildlife — marine conservation and booking systems"
    class="hero-img contact-hero-img"
    id="hero-img"
  />
  <div class="hero-overlay"></div>
  <div class="hero-caption">
    <h1>Get in Touch</h1>
    <p>Booking systems and wildlife monitoring for MPAs </p>
  </div>
</section>


<!-- ═══════════════════════════════════════
     CONTACT FORM
═══════════════════════════════════════ -->
<section class="contact-form-section">
  <div class="contact-form-wrap reveal">
    <form id="contact-form" action="https://formspree.io/f/xlgvrjrp" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label for="whatsapp">WhatsApp <span style="font-weight:300; text-transform:none; letter-spacing:0;">(optional)</span></label>
        <input type="tel" id="whatsapp" name="whatsapp"  />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell us about your project..." required></textarea>
      </div>
      <div class="form-submit">
        <button type="submit" class="btn btn-ocean">Send</button>
      </div>
      <div class="form-success" id="form-success">
        Thank you — we'll be in touch soon.
      </div>
    </form>
  </div>
</section>


<!-- ═══════════════════════════════════════
     FOOTER
═══════════════════════════════════════ -->
<div id="shared-footer"></div>
<script src="../js/footer.js"></script>


<!-- ═══════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════ -->
<script>
  /* --- Nav scroll state --- */
  const nav = document.getElementById('main-nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });

  /* --- Parallax hero --- */
  const heroImg = document.getElementById('hero-img');
  window.addEventListener('scroll', () => {
    if (!heroImg) return;
    const pct = window.scrollY / window.innerHeight;
    heroImg.style.transform = `scale(1.08) translateY(${pct * 48}px)`;
  }, { passive: true });

  /* --- Nav hamburger --- */
  const hamburger = document.getElementById('nav-hamburger');
  if (hamburger) {
    hamburger.addEventListener('click', () => {
      const expanded = hamburger.getAttribute('aria-expanded') === 'true';
      hamburger.setAttribute('aria-expanded', String(!expanded));
      nav.classList.toggle('nav-open', !expanded);
    });
  }

  /* --- Contact form AJAX submit --- */
  const form = document.getElementById('contact-form');
  if (form) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { Accept: 'application/json' }
      });
      if (res.ok) {
        form.reset();
        btn.style.display = 'none';
        document.getElementById('form-success').style.display = 'block';
      } else {
        btn.disabled = false;
        btn.textContent = 'Send';
        alert('Something went wrong — please try again.');
      }
    });
  }

  /* --- Scroll reveal --- */
  const revealEls = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  revealEls.forEach(el => observer.observe(el));
</script>

</body>
</html>
